services:
  db-server:
    image: mysql:8.0
    container_name: "${MY_USERNAME}-db"
    environment:
      MYSQL_DATABASE: "${DB_NAME}"                 # ต้องเป็น my_app_db
      MYSQL_USER: "app_user"                       # ต้องตรงกับ index.php
      MYSQL_PASSWORD_FILE: "/run/secrets/db_user_pass"
      MYSQL_ROOT_PASSWORD_FILE: "/run/secrets/db_root_pass"
    secrets:
      - db_root_pass
      - db_user_pass
    volumes:
      - db-storage:/var/lib/mysql
    networks:
      - backend-zone

  backend-php:
    # ถ้าคุณมี Dockerfile ติดตั้ง pdo_mysql แล้ว ใช้ build แบบนี้
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: "${MY_USERNAME}-backend"
    environment:
      # ใส่ไว้ไม่เสียหาย ถึง index.php จะ hardcode ก็ยังโอเค
      DB_NAME: "${DB_NAME}"
      DB_USER: "app_user"
      DB_PASSWORD_FILE: "/run/secrets/db_user_pass"
    secrets:
      - db_user_pass
    volumes:
      - ./app:/var/www/html
    networks:
      - backend-zone

  web-proxy:
    image: nginx:latest
    container_name: "${MY_USERNAME}-web"
    depends_on:
      - backend-php
    ports:
      - "${HTTP_PORT}:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - ./app:/var/www/html:ro
    networks:
      - frontend-zone
      - backend-zone

  db-management:
    image: phpmyadmin:latest
    container_name: "${MY_USERNAME}-pma"
    depends_on:
      - db-server
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: "db-server"
      PMA_USER: "app_user"                         # ต้องตรงกับ index.php / MYSQL_USER
      PMA_PASSWORD_FILE: "/run/secrets/db_user_pass"
    secrets:
      - db_user_pass
    networks:
      - frontend-zone
      - backend-zone

volumes:
  db-storage:

networks:
  frontend-zone:
  backend-zone:
    internal: true

secrets:
  db_root_pass:
    file: ./secret/.db_root_pass.txt
  db_user_pass:
    file: ./secret/.db_user_pass.txt

configs:
  nginx_conf:
    file: ./nginx/my-nginx.conf